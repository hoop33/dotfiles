[character]
success_symbol = "[оң‘](#1cd404)"
error_symbol = "[оҲұ](#9d0003)"
vicmd_symbol = "[оҳ«](#1cd404)"

[aws]
symbol = "оһӯ "
format = "[$symbol$profile(\\($region\\))]($style) "

[directory]
format = "[$path]($style) "
style = "bold italic #7096ff"

[git_branch]
symbol = "пҗҳ"
format = "[$symbol $branch]($style) "
style = "bold italic #eb5c1b"

[git_status]
format = "[$all_status$ahead_behind](purple)"
ahead = "пҗҠ "
behind = "пҗү "
conflicted = "оһҖ "
deleted = "пҮё "
diverged = "пҒҘ "
modified = "п‘Ҳ "
renamed = "піҹ "
staged = "п‘— "
stashed = "п’Ү "
untracked = "пһҹ "

[golang]
symbol = "оҳ§ "
format = "[$symbol$version](#6fcce4) "

[kubernetes]
disabled = true

[nodejs]
symbol = "оһҒ "
format = "[$symbol$version](#ffd700) "

[package]
format = "[$symbol$version](#ab764d) "

[rust]
format = "[$symbol$version](#e34116) "

[java]
format = "[$symbol($version )]($style)"

[scala]
symbol = "оң· "
format = "[$symbol($version )]($style)"

[python]
format = "[$symbol($version )]($style)"

[username]
disabled = true

[custom.git_remote]
command = "git remote get-url origin 2>/dev/null | sed 's|.*://||;s|.*@||;s|/.*||;s|:.*||'"
when = "git rev-parse --git-dir 2>/dev/null"
format = "[$output]($style) "
style = "bold #eb5c1b"

